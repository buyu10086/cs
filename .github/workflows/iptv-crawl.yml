name: 名著目录更新
on:
  schedule:
    # 保留原配置的 UTC 9点、21点执行（对应北京时间17点、5点）
    # 北京时间 9 点、21 点 → UTC 时间为 1 点、13 点（UTC+8 时差）
    - cron: "0 9,21 * * *"  
  workflow_dispatch:  # 支持手动触发

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免提交时冲突
          # 确保拉取正确的main分支
          ref: ${{ github.ref }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 缓存 pip 依赖，加速后续运行
          cache-dependency-path: "requirements.txt"

      - name: 升级 pip 并安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫脚本生成文件
        id: run_script
        run: |
          echo "=== 开始执行爬虫脚本 ==="
          python iptv_crawler.py
          echo "=== 脚本执行完成 ==="
          ls -la iptv_playlist.m3u8  # 验证文件是否生成

      - name: 提交并推送更新
        id: commit_push
        if: steps.run_script.outcome == 'success'  # 仅脚本执行成功时提交
        run: |
          echo "=== 配置 Git 用户信息 ==="
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 核心修复：拉取远程最新变更，解决fetch first冲突
          echo "=== 拉取远程最新代码 ==="
          git pull --rebase origin ${{ github.ref_name }} || git pull --allow-unrelated-histories origin ${{ github.ref_name }}
          
          # 添加目标文件
          git add iptv_playlist.m3u8
          
          # 检查是否有变更需要提交
          if git diff --cached --quiet; then
            echo "=== 没有新的变更，无需提交 ==="
            exit 0
          fi
          
          # 提交并推送
          echo "=== 提交并推送更新 ==="
          git commit -m "自动更新IPTV播放列表 $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 自动注入的令牌，用于推送

      - name: 执行结果汇总
        run: |
          echo "=== 流程执行完成 ==="
          echo "依赖安装状态：${{ steps.install_deps.outcome }}"
          echo "脚本执行状态：${{ steps.run_script.outcome }}"
          echo "提交推送状态：${{ steps.commit_push.outcome }}"
        if: always()  # 无论前面步骤是否成功，都输出汇总日志
