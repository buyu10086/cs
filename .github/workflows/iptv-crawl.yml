name: 名著目录更新

on:
  schedule:
    # 保留你原配置的 UTC 9点、21点执行（对应北京时间17点、5点）
    - cron: "0 9,21 * * *"  
  workflow_dispatch:  # 支持手动触发

jobs:
  run-itvlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予提交代码的权限
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免提交时冲突
          ref: ${{ github.ref }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 缓存 pip 依赖，加速后续运行
          cache-dependency-path: "requirements.txt"

      - name: 升级 pip 并安装依赖
        run: |
          echo "=== 升级 pip 版本 ==="
          python -m pip install --upgrade pip
          echo "=== 安装 requirements.txt 中的依赖 ==="
          pip install -r requirements.txt || echo "requirements.txt不存在，跳过该步骤"
          echo "=== 安装额外依赖（tqdm/aiohttp） ==="
          pip install tqdm aiohttp
        id: install_deps

      - name: 运行爬虫脚本 iptv_crawler.py
        run: |
          echo "=== 开始执行爬虫脚本 ==="
          python iptv_crawler.py
          echo "=== 爬虫脚本执行完成 ==="
        id: run_script
        continue-on-error: false  # 脚本执行失败则终止流程

      - name: 检查文件变更并提交
        run: |
          # 配置 git 身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 【核心修复】先重置工作区到干净状态，解决未暂存文件导致的rebase报错
          echo "=== 重置工作区并拉取远程最新代码 ==="
          git fetch origin ${{ github.ref_name }}  # 获取远程最新代码
          git reset --hard origin/${{ github.ref_name }}  # 强制重置到远程分支状态
          # 兜底逻辑：若reset失败，尝试普通拉取（兼容特殊情况）
          git pull origin ${{ github.ref_name }} || git pull --allow-unrelated-histories origin ${{ github.ref_name }}
          
          # 重新运行脚本（因为reset会覆盖刚才生成的文件）
          echo "=== 重新执行爬虫脚本生成最新文件 ==="
          python iptv_crawler.py
          
          # 添加目标文件
          git add iptv_playlist.m3u8
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "=== 无文件变更，跳过提交 ==="
            exit 0
          fi
          
          # 提交并推送
          echo "=== 提交变更到仓库 ==="
          git commit -m "自动更新：iptv_playlist.m3u8 $(date +'%Y-%m-%d %H:%M:%S')"
          echo "=== 推送变更到远程分支 ==="
          git push origin HEAD:${{ github.ref }}
        id: commit_push
        if: steps.run_script.outcome == 'success'  # 仅脚本执行成功时提交
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 执行结果汇总
        run: |
          echo "=== 流程执行完成 ==="
          echo "依赖安装状态：${{ steps.install_deps.outcome }}"
          echo "脚本执行状态：${{ steps.run_script.outcome }}"
          echo "提交推送状态：${{ steps.commit_push.outcome }}"
        if: always()
